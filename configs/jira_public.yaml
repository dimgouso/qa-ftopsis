paths:
  input_csv: ../artifacts/benchmarks/jira_public/jira_router_benchmark.parquet
  prepared_dir: ../artifacts/prepared/jira_public
  model_dir: ../artifacts/models/jira_public
  run_root: ../artifacts/runs
  report_root: ../artifacts/reports

data:
  random_state: 7
  dataset_profile: jira_public
  priority_mapping:
    lowest: low
    low: low
    minor: low
    trivial: low
    medium: medium
    major: medium
    normal: medium
    high: high
    highest: high
    critical: high
    blocker: high
  stratify_fields: [queue]

model:
  word_ngram_range: [1, 2]
  char_ngram_range: [3, 5]
  word_max_features: 40000
  char_max_features: 30000
  max_iter: 1000
  sublinear_tf: true
  prepend_language_token: false

simulation:
  queue_discipline: fifo
  slot_order: serve_then_arrive
  serve_new_same_slot: false
  capacity_mode: uniform_one
  seeds: [11, 17, 23, 29, 37]
  primary_sla:
    high: 3
    medium: 6
    low: 10
  robustness_sla:
    high: 2
    medium: 5
    low: 8
  scenarios:
    normal:
      lambda_base: 10
      rho_target: 0.75
    high_load:
      lambda_base: 14
      rho_target: 0.95
    bursty:
      lambda_base: 12
      rho_target: 0.82
      burst_lambda: 20
      burst_interval: 11
      burst_start_offset: 3
  environment_matrix:
    service_models: [empirical]
    delay_modes: [embedding_kappa, learned_jira_delay]

skill_features:
  model_name: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  max_length: 256
  batch_size: 64
  device: cpu
  kappa_min: 0.8
  kappa_max: 1.4

jira:
  raw_issues_path: ../data/public_jira_export/issues.parquet
  raw_history_path: ../data/public_jira_export/history.parquet
  benchmark_dir: ../artifacts/benchmarks/jira_public
  instance_filter: []
  queue_field: component
  min_queue_size: 300
  slot_hours: 8
  max_service_units: 40
  resolution_target: time_to_resolution_hours

delay_model:
  model_type: random_forest
  n_estimators: 160
  max_depth: 8
  min_samples_leaf: 2

routing:
  topk_gate:
    enabled: true
    k: 3
    policy_names: [qa_ftopsis, jsq]

tuning:
  alpha_grid: [0.25, 0.5, 1.0, 2.0]
  qa_guard_thresholds: [null, 0.6, 0.7, 0.8]
  qa_weights:
    - [0.30, 0.40, 0.30]
    - [0.25, 0.35, 0.40]
    - [0.35, 0.40, 0.25]
  selection_scenarios: [high_load, bursty]

reporting:
  explainability_sample_size: 100
